spring:
    datasource:
        url: ${DB_URL}
        username: ${DB_USER}
        password: ${DB_PASS}
    jpa: 
        hibernate:
            ddl-auto: validate
        show-sql: true
        database-platform: org.hibernate.dialect.PostgreSQLDialect
        properties:
            hibernate:
                default_schema: public
    security:
        oauth2:
            client:
                registration:
                    google:
                        client-id: ${GOOGLE_CLIENT_ID}
                        client-secret: ${GOOGLE_CLIENT_SECRET}
                        scope: email, profile
                        redirect-uri: ${GOOGLE_REDIRECT_URI}
    server:
        servlet:
            session:
                cookie:
                    same-site: none
                    secure: false
                    http-only: true
    application:
        name: Runner-Backend
